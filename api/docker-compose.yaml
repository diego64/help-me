services:
  # ============================================
  # BANCO DE DADOS - PostgreSQL
  # ============================================
  postgresql_helpme:
    image: postgres:16
    container_name: postgresql_helpme
    hostname: postgresql_helpme
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgresql_data:/var/lib/postgresql/data
      - ./api/database/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql
      - postgresql_backups:/backups
      - postgresql_archive:/archive
    networks:
      - helpme_network
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "max_connections=${DB_MAX_CONNECTIONS:-100}"
      - "-c"
      - "shared_buffers=${DB_SHARED_BUFFERS:-256MB}"
      - "-c"
      - "effective_cache_size=${DB_EFFECTIVE_CACHE_SIZE:-1GB}"
      - "-c"
      - "work_mem=${POSTGRESQL_WORK_MEM:-16MB}"
      - "-c"
      - "maintenance_work_mem=128MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "wal_buffers=16MB"
      - "-c"
      - "default_statistics_target=100"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "min_wal_size=1GB"
      - "-c"
      - "max_wal_size=4GB"
      - "-c"
      - "password_encryption=scram-sha-256"
      - "-c"
      - "shared_preload_libraries=pg_stat_statements"
      - "-c"
      - "log_timezone=America/Sao_Paulo"
      - "-c"
      - "timezone=America/Sao_Paulo"
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=database"
      - "com.helpme.database.type=postgresql"
      - "com.helpme.environment=production"

  # ============================================
  # BANCO DE DADOS - MongoDB
  # ============================================
  mongodb_helpme:
    image: mongo:8.0
    container_name: mongodb_helpme
    hostname: mongodb_helpme
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE}
      TZ: America/Sao_Paulo
    command: mongod --bind_ip_all --auth
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongodb_data:/data/db
      - ./api/database/init-mongo.js:/docker-entrypoint-initdb.d/init-mongo.js
    networks:
      - helpme_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: |
        mongosh --quiet --username ${MONGO_INITDB_ROOT_USERNAME} \
          --password ${MONGO_INITDB_ROOT_PASSWORD} \
          --authenticationDatabase admin \
          --eval "db.adminCommand('ping')" > /dev/null
      interval: 15s
      timeout: 10s
      start_period: 40s
      retries: 3
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=database"
      - "com.helpme.database.type=mongodb"
      - "com.helpme.environment=production"

  # ============================================
  # STORAGE - MinIO
  # ============================================
  minio_helpme:
    image: minio/minio:latest
    container_name: minio_helpme
    hostname: minio_helpme
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
      TZ: America/Sao_Paulo
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9000}:9000"
      - "${MINIO_CONSOLE_PORT:-9001}:9001"
    volumes:
      - minio_data:/data
    networks:
      - helpme_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=storage"
      - "com.helpme.storage.type=minio"
      - "com.helpme.environment=production"

  # ============================================
  # MESSAGE BROKER - Kafka
  # ============================================
  zookeeper_helpme:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper_helpme
    hostname: zookeeper_helpme
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT:-2181}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME:-2000}
      TZ: America/Sao_Paulo
    ports:
      - '${ZOOKEEPER_PORT:-2181}:2181'
    networks:
      - helpme_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=messaging"
      - "com.helpme.messaging.type=zookeeper"

  kafka_helpme:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka_helpme
    hostname: kafka_helpme
    depends_on:
      - zookeeper_helpme
    ports:
      - '9092:9092'
      - '9093:9093'
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper_helpme:2181'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka_helpme:9092,PLAINTEXT_HOST://localhost:9093
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      TZ: America/Sao_Paulo
    networks:
      - helpme_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=messaging"
      - "com.helpme.messaging.type=kafka"

  control_center_helpme:
    image: confluentinc/cp-enterprise-control-center:7.5.0
    container_name: control_center_helpme
    hostname: control_center_helpme
    depends_on:
      - kafka_helpme
      - zookeeper_helpme
    ports:
      - '${CONTROL_CENTER_PORT:-9021}:9021'
    environment:
      CONTROL_CENTER_BOOTSTRAP_SERVERS: ${CONTROL_CENTER_BOOTSTRAP_SERVERS:-kafka_helpme:9092}
      CONTROL_CENTER_ZOOKEEPER_CONNECT: ${CONTROL_CENTER_ZOOKEEPER_CONNECT:-zookeeper_helpme:2181}
      CONTROL_CENTER_REPLICATION_FACTOR: ${CONTROL_CENTER_REPLICATION_FACTOR:-1}
      PORT: 9021
      TZ: America/Sao_Paulo
    networks:
      - helpme_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=messaging"
      - "com.helpme.messaging.type=control-center"

  # ============================================
  # CACHE - Redis
  # ============================================
  redis_helpme:
    image: redis:8.0
    container_name: redis_helpme
    hostname: redis_helpme
    environment:
      TZ: America/Sao_Paulo
      REDIS_PASSWORD: ${REDIS_PASSWORD}
    command: >
      sh -c '
      if [ -z "$REDIS_PASSWORD" ]; then
        redis-server
        --maxmemory ${REDIS_MAX_MEMORY:-512mb}
        --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
        --appendonly yes
        --appendfsync everysec
      else
        redis-server
        --requirepass "$REDIS_PASSWORD"
        --maxmemory ${REDIS_MAX_MEMORY:-512mb}
        --maxmemory-policy ${REDIS_MAXMEMORY_POLICY:-allkeys-lru}
        --appendonly yes
        --appendfsync everysec
      fi
      '
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    networks:
      - helpme_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 768M
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=cache"
      - "com.helpme.cache.type=redis"

  # ============================================
  # MONITORAMENTO - InfluxDB
  # ============================================
  influxdb_helpme:
    image: influxdb:2.7-alpine
    container_name: influxdb_helpme
    hostname: influxdb_helpme
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USERNAME}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG:-org}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET}
      DOCKER_INFLUXDB_INIT_RETENTION: ${INFLUX_RETENTION}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_ADMIN_TOKEN}
      INFLUXDB_HTTP_LOG_ENABLED: ${INFLUX_HTTP_LOG_ENABLED:-true}
      TZ: America/Sao_Paulo
    ports:
      - "${INFLUX_PORT:-8086}:8086"
    volumes:
      - influxdb_data:/var/lib/influxdb2
      - influxdb_config:/etc/influxdb2
    networks:
      - helpme_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=monitoring"
      - "com.helpme.monitoring.type=timeseries"

  # ============================================
  # MONITORAMENTO - Loki (Logs)
  # ============================================
  loki_helpme:
      image: grafana/loki:3.0.0
      container_name: loki_helpme
      hostname: loki_helpme
      environment:
        TZ: America/Sao_Paulo
      ports:
        - "${LOKI_PORT:-3100}:3100"
      command: -config.file=/etc/loki/local-config.yaml
      volumes:
        - ./painel-analitico/monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
        - loki_data:/loki
      networks:
        - helpme_network
      restart: unless-stopped
      deploy:
        resources:
          limits:
            cpus: '1'
            memory: 1G
          reservations:
            cpus: '0.25'
            memory: 256M
      healthcheck:
        test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3100/ready || exit 1"]
        interval: 10s
        timeout: 5s
        retries: 5
        start_period: 10s
      logging:
        driver: "json-file"
        options:
          max-size: "10m"
          max-file: "3"
      labels:
        - "com.helpme.service=monitoring"
        - "com.helpme.monitoring.type=logs"

  # ============================================
  # MONITORAMENTO - Promtail (Log Collector)
  # ============================================
  promtail_helpme:
    image: grafana/promtail:3.0.0
    container_name: promtail_helpme
    hostname: promtail_helpme
    command: -config.file=/etc/promtail/config.yml
    environment:
      TZ: America/Sao_Paulo
    volumes:
    - ./painel-analitico/monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
    - /var/lib/docker/containers:/var/lib/docker/containers:ro
    - /var/run/docker.sock:/var/run/docker.sock:ro
    networks:
      - helpme_network
    depends_on:
      loki_helpme:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=monitoring"
      - "com.helpme.monitoring.type=log-collector"

  # ============================================
  # MONITORAMENTO - Grafana
  # ============================================
  grafana_helpme:
    image: grafana/grafana:10.2.3
    container_name: grafana_helpme
    hostname: grafana_helpme
    environment:
      GF_SECURITY_ADMIN_USER: ${GRAFANA_USER}
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD}
      GF_AUTH_ANONYMOUS_ENABLED: "false"
      GF_AUTH_BASIC_ENABLED: "true"
      GF_SERVER_ROOT_URL: http://localhost:${GRAFANA_PORT:-3001}
      GF_PATHS_PROVISIONING: /etc/grafana/provisioning
      GF_INSTALL_PLUGINS: grafana-mongodb-datasource,redis-datasource
      GF_METRICS_ENABLED: ${GRAFANA_METRICS_ENABLED:-true}
      TZ: America/Sao_Paulo
    ports:
      - "${GRAFANA_PORT:-3001}:3000"
    volumes:
      - grafana_data:/var/lib/grafana
      - ./painel-analitico/grafana/provisioning/datasources:/etc/grafana/provisioning/datasources:ro
      - ./painel-analitico/grafana/provisioning/dashboards:/etc/grafana/provisioning/dashboards:ro
      - ./painel-analitico/grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - helpme_network
    depends_on:
      - influxdb_helpme
      - postgresql_helpme
      - loki_helpme
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:3000/api/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=monitoring"
      - "com.helpme.monitoring.type=visualization"

  # ============================================
  # MONITORAMENTO - Prometheus
  # ============================================
  prometheus_helpme:
    image: prom/prometheus:v2.48.1
    container_name: prometheus_helpme
    hostname: prometheus_helpme
    environment:
      TZ: America/Sao_Paulo
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--web.console.libraries=/usr/share/prometheus/console_libraries'
      - '--web.console.templates=/usr/share/prometheus/consoles'
      - '--storage.tsdb.retention.time=${PROMETHEUS_RETENTION:-15d}'
      - '--web.enable-lifecycle'
    ports:
      - "${PROMETHEUS_PORT:-9090}:9090"
    volumes:
      - ./painel-analitico/monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    networks:
      - helpme_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:9090/-/healthy || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=monitoring"
      - "com.helpme.monitoring.type=metrics"

  # ============================================
  # MONITORAMENTO - Node Exporter
  # ============================================
  node_exporter_helpme:
    image: prom/node-exporter:v1.7.0
    container_name: node_exporter_helpme
    hostname: node_exporter_helpme
    environment:
      TZ: America/Sao_Paulo
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/rootfs'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
    ports:
      - "${NODE_EXPORTER_PORT:-9100}:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    networks:
      - helpme_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=monitoring"
      - "com.helpme.monitoring.type=exporter"
      - "com.helpme.exporter.target=node"

  # ============================================
  # MONITORAMENTO - cAdvisor
  # ============================================
  cadvisor_helpme:
    image: gcr.io/cadvisor/cadvisor:v0.49.1
    container_name: cadvisor_helpme
    hostname: cadvisor_helpme
    privileged: true
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "${CADVISOR_PORT:-8080}:8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /sys/fs/cgroup:/sys/fs/cgroup:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    command:
      - '--housekeeping_interval=30s'
      - '--docker_only=false'
      - '--store_container_labels=false'
    networks:
      - helpme_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=monitoring"
      - "com.helpme.monitoring.type=container-metrics"

  # ============================================
  # MONITORAMENTO - PostgreSQL Exporter
  # ============================================
  postgres_exporter_helpme:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    container_name: postgres_exporter_helpme
    hostname: postgres_exporter_helpme
    environment:
      DATA_SOURCE_NAME: "postgresql://${DB_USER}:${DB_PASSWORD}@postgresql_helpme:5432/${DB_NAME}?sslmode=disable"
      TZ: America/Sao_Paulo
    ports:
      - "${POSTGRES_EXPORTER_PORT:-9187}:9187"
    networks:
      - helpme_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=monitoring"
      - "com.helpme.monitoring.type=exporter"
      - "com.helpme.exporter.target=postgresql"

  # ============================================
  # MONITORAMENTO - MongoDB Exporter
  # ============================================
  mongodb_exporter_helpme:
    image: percona/mongodb_exporter:0.40
    container_name: mongodb_exporter_helpme
    hostname: mongodb_exporter_helpme
    environment:
      MONGODB_URI: "mongodb://${MONGO_INITDB_ROOT_USERNAME}:${MONGO_INITDB_ROOT_PASSWORD}@mongodb_helpme:27017/?authSource=admin"
      TZ: America/Sao_Paulo
    ports:
      - "${MONGODB_EXPORTER_PORT:-9216}:9216"
    command:
      - '--mongodb.direct-connect=true'
      - '--mongodb.global-conn-pool=true'
      - '--collect-all'
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    networks:
      - helpme_network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=monitoring"
      - "com.helpme.monitoring.type=exporter"
      - "com.helpme.exporter.target=mongodb"

  # ============================================
  # MONITORAMENTO - Redis Exporter
  # ============================================
  redis_exporter_helpme:
    image: oliver006/redis_exporter:v1.55.0
    container_name: redis_exporter_helpme
    hostname: redis_exporter_helpme
    environment:
      REDIS_ADDR: "redis_helpme:6379"
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      TZ: America/Sao_Paulo
    ports:
      - "${REDIS_EXPORTER_PORT:-9121}:9121"
    networks:
      - helpme_network
    restart: unless-stopped
    depends_on:
      - redis_helpme
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=monitoring"
      - "com.helpme.monitoring.type=exporter"
      - "com.helpme.exporter.target=redis"

  # ============================================
  # MONITORAMENTO - Kafka Exporter
  # ============================================
  kafka_exporter_helpme:
    image: danielqsj/kafka-exporter:v1.7.0
    container_name: kafka_exporter_helpme
    hostname: kafka_exporter_helpme
    environment:
      TZ: America/Sao_Paulo
    ports:
      - "${KAFKA_EXPORTER_PORT:-9308}:9308"
    command:
      - '--kafka.server=kafka_helpme:9092'
    networks:
      - helpme_network
    restart: unless-stopped
    depends_on:
      - kafka_helpme
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=monitoring"
      - "com.helpme.monitoring.type=exporter"
      - "com.helpme.exporter.target=kafka"

 # ============================================
  # BANCO DE DADOS - PostgreSQL (Teste)
  # ============================================
  postgresql_helpme_teste:
    image: postgres:16
    container_name: postgresql_helpme_teste
    hostname: postgresql_helpme_teste
    environment:
      POSTGRES_USER: ${DB_USER_TESTE:-teste}
      POSTGRES_PASSWORD: ${DB_PASSWORD_TESTE:-senha_teste}
      POSTGRES_DB: ${DB_NAME_TESTE:-helpme-database-teste}
      TZ: America/Sao_Paulo
      PGTZ: America/Sao_Paulo
    ports:
      - "${DB_PORT_TESTE:-5434}:5432"
    volumes:
      - postgresql_data_teste:/var/lib/postgresql/data
    networks:
      - helpme_network
    restart: unless-stopped
    command:
      - "postgres"
      - "-c"
      - "max_connections=50"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "timezone=America/Sao_Paulo"
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER_TESTE:-teste} -d ${DB_NAME_TESTE:-helpme-database-teste}"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=database"
      - "com.helpme.database.type=postgresql"
      - "com.helpme.environment=test"

  # ============================================
  # BANCO DE DADOS - MongoDB (Teste)
  # ============================================
  mongodb_helpme_teste:
    image: mongo:8.0
    container_name: mongodb_helpme_teste
    hostname: mongodb_helpme_teste
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME_TESTE}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD_TESTE}
      MONGO_INITDB_DATABASE: ${MONGO_INITDB_DATABASE_TESTE}
      TZ: America/Sao_Paulo
    command: mongod --bind_ip_all --auth
    ports:
      - "${MONGO_PORT_TESTE:-27018}:27017"
    volumes:
      - mongodb_teste_data:/data/db
    networks:
      - helpme_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M
    healthcheck:
      test: |
        mongosh --quiet --username ${MONGO_INITDB_ROOT_USERNAME_TESTE:-teste} \
          --password ${MONGO_INITDB_ROOT_PASSWORD_TESTE:-senha_teste} \
          --authenticationDatabase admin \
          --eval "db.adminCommand('ping')" > /dev/null || exit 1
      interval: 15s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=database"
      - "com.helpme.database.type=mongodb"
      - "com.helpme.environment=test"

# ============================================
  # STORAGE - MinIO (Teste)
  # ============================================
  minio_helpme_teste:
    image: minio/minio:latest
    container_name: minio_helpme_teste
    hostname: minio_helpme_teste
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER_TESTE:-minio_teste}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD_TESTE:-minio_teste_senha}
      TZ: America/Sao_Paulo
    command: server /data --console-address ":9003"
    ports:
      - "${MINIO_PORT_TESTE:-9002}:9000"
      - "${MINIO_CONSOLE_PORT_TESTE:-9003}:9003"
    volumes:
      - minio_data_teste:/data
    networks:
      - helpme_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:9000/minio/health/live || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=storage"
      - "com.helpme.storage.type=minio"
      - "com.helpme.environment=test"

  # ============================================
  # CACHE - Redis (Teste)
  # ============================================
  redis_helpme_teste:
    image: redis:8.0
    container_name: redis_helpme_teste
    hostname: redis_helpme_teste
    environment:
      TZ: America/Sao_Paulo
      REDIS_PASSWORD: ${REDIS_PASSWORD_TESTE:-}
    command: >
      sh -c '
      if [ -z "$REDIS_PASSWORD_TESTE" ]; then
        redis-server
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly no
        --save ""
      else
        redis-server
        --requirepass "$REDIS_PASSWORD_TESTE"
        --maxmemory 256mb
        --maxmemory-policy allkeys-lru
        --appendonly no
        --save ""
      fi
      '
    ports:
      - "${REDIS_PORT_TESTE:-6380}:6379"
    networks:
      - helpme_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "redis-cli ping || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=cache"
      - "com.helpme.cache.type=redis"
      - "com.helpme.environment=test"

  # ============================================
  # MESSAGE BROKER - Zookeeper (Teste)
  # ============================================
  zookeeper_helpme_teste:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: zookeeper_helpme_teste
    hostname: zookeeper_helpme_teste
    environment:
      ZOOKEEPER_CLIENT_PORT: ${ZOOKEEPER_CLIENT_PORT_TESTE:-2182}
      ZOOKEEPER_TICK_TIME: ${ZOOKEEPER_TICK_TIME_TESTE:-2000}
      TZ: America/Sao_Paulo
    ports:
      - '${ZOOKEEPER_PORT_TESTE:-2182}:2182'
    networks:
      - helpme_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=messaging"
      - "com.helpme.messaging.type=zookeeper"
      - "com.helpme.environment=test"

  # ============================================
  # MESSAGE BROKER - Kafka (Teste)
  # ============================================
  kafka_helpme_teste:
    image: confluentinc/cp-kafka:7.5.0
    container_name: kafka_helpme_teste
    hostname: kafka_helpme_teste
    depends_on:
      - zookeeper_helpme_teste
    ports:
      - '9094:9092'
      - '9095:9093'
    environment:
      KAFKA_BROKER_ID: 2
      KAFKA_ZOOKEEPER_CONNECT: 'zookeeper_helpme_teste:2182'
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,PLAINTEXT_HOST://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka_helpme_teste:9092,PLAINTEXT_HOST://localhost:9095
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: 'true'
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_LOG_RETENTION_HOURS: 1
      TZ: America/Sao_Paulo
    networks:
      - helpme_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=messaging"
      - "com.helpme.messaging.type=kafka"
      - "com.helpme.environment=test"

  # ============================================
  # MONITORAMENTO - InfluxDB (Teste)
  # ============================================
  influxdb_helpme_teste:
    image: influxdb:2.7-alpine
    container_name: influxdb_helpme_teste
    hostname: influxdb_helpme_teste
    environment:
      DOCKER_INFLUXDB_INIT_MODE: setup
      DOCKER_INFLUXDB_INIT_USERNAME: ${INFLUX_USERNAME_TESTE:-teste}
      DOCKER_INFLUXDB_INIT_PASSWORD: ${INFLUX_PASSWORD_TESTE:-senha_teste}
      DOCKER_INFLUXDB_INIT_ORG: ${INFLUX_ORG_TESTE:-org_teste}
      DOCKER_INFLUXDB_INIT_BUCKET: ${INFLUX_BUCKET_TESTE:-helpme_bucket_teste}
      DOCKER_INFLUXDB_INIT_RETENTION: ${INFLUX_RETENTION_TESTE:-1d}
      DOCKER_INFLUXDB_INIT_ADMIN_TOKEN: ${INFLUX_ADMIN_TOKEN_TESTE:-TestToken123456}
      INFLUXDB_HTTP_LOG_ENABLED: false
      TZ: America/Sao_Paulo
    ports:
      - "${INFLUX_PORT_TESTE:-8087}:8086"
    volumes:
      - influxdb_data_teste:/var/lib/influxdb2
      - influxdb_config_teste:/etc/influxdb2
    networks:
      - helpme_network
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M
    healthcheck:
      test: ["CMD-SHELL", "wget --no-verbose --tries=1 --spider http://localhost:8086/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    labels:
      - "com.helpme.service=monitoring"
      - "com.helpme.monitoring.type=timeseries"
      - "com.helpme.environment=test"

# ============================================
# NETWORKS
# ============================================
networks:
  helpme_network:
    driver: bridge
    name: helpme_network
    ipam:
      config:
        - subnet: 172.28.0.0/16
          gateway: 172.28.0.1

# ============================================
# VOLUMES
# ============================================
volumes:
  postgresql_data:
    driver: local

  postgresql_backups:
    driver: local
    name: postgresql_helpme_backups

  postgresql_archive:
    driver: local
    name: postgresql_helpme_archive

  mongodb_data:
    driver: local
    name: mongodb_helpme_data

  redis_data:
    driver: local
    name: redis_helpme_data

  influxdb_data:
    driver: local
    name: influxdb_helpme_data

  influxdb_config:
    driver: local
    name: influxdb_helpme_config

  loki_data:
    driver: local
    name: loki_helpme_data

  grafana_data:
    driver: local
    name: grafana_helpme_data

  prometheus_data:
    driver: local
    name: prometheus_helpme_data

  postgresql_data_teste:
    driver: local
    name: postgresql_helpme_data_teste

  mongodb_teste_data:
    driver: local
    name: mongodb_helpme_teste_data

  minio_data:
    driver: local
    name: minio_helpme_data

  minio_data_teste:
    driver: local
    name: minio_helpme_data_teste

  influxdb_data_teste:
    driver: local
    name: influxdb_helpme_data_teste

  influxdb_config_teste:
    driver: local
    name: influxdb_helpme_config_teste