server:
  http_listen_port: 9080
  grpc_listen_port: 0
  log_level: info

positions:
  filename: /tmp/positions.yaml

clients:
  - url: http://loki_helpme:3100/loki/api/v1/push

scrape_configs:
  # Coletar logs de TODOS os containers Docker
  - job_name: helpme-api-host
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 5s
    
    relabel_configs:
      # Nome do container
      - source_labels: ['__meta_docker_container_name']
        regex: '/(.*)'
        target_label: 'container'
      
      # Stream (stdout/stderr)
      - source_labels: ['__meta_docker_container_log_stream']
        target_label: 'stream'
    
    pipeline_stages:
      # Parsear JSON do Pino
      - json:
          expressions:
            level: level
            msg: msg
            message: message
            time: time
            service: service
            requestId: requestId
            method: method
            url: url
            statusCode: statusCode
      
      # Adicionar labels
      - labels:
          level:
          service:
      
      # Timestamp
      - timestamp:
          source: time
          format: RFC3339Nano
          fallback_formats:
            - RFC3339
            - "2006-01-02T15:04:05.999Z07:00"