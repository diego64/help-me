# ============================================================
# Kustomize entry point
# Aplicar tudo: kubectl apply -k k8s/
# ============================================================
apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

resources:
  - namespace.yaml
  - configmap.yaml
  - secret.yaml
  - postgres/statefulset.yaml
  - postgres/service.yaml
  - redis/deployment.yaml
  - redis/service.yaml
  - app/deployment.yaml
  - app/service.yaml
