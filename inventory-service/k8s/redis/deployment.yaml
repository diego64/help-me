apiVersion: apps/v1
kind: Deployment
metadata:
  name: inventory-redis
  namespace: inventory
  labels:
    app.kubernetes.io/name: inventory-redis
    app.kubernetes.io/part-of: helpme
spec:
  replicas: 1
  selector:
    matchLabels:
      app: inventory-redis
  template:
    metadata:
      labels:
        app: inventory-redis
        app.kubernetes.io/name: inventory-redis
    spec:
      securityContext:
        runAsUser: 999   # uid do usuário redis na imagem oficial
        runAsGroup: 999
        fsGroup: 999
      containers:
        - name: redis
          image: redis:8.6
          command:
            - redis-server
            - --requirepass
            - $(REDIS_PASSWORD)
            - --maxmemory
            - 128mb
            - --maxmemory-policy
            - allkeys-lru
            - --protected-mode
            - "yes"
            - --loglevel
            - warning
            - --save
            - ""
            - --appendonly
            - "no"
          ports:
            - containerPort: 6379
          env:
            - name: REDIS_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: inventory-secrets
                  key: REDIS_PASSWORD
          livenessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 5
          readinessProbe:
            exec:
              command: ["redis-cli", "-a", "$(REDIS_PASSWORD)", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            requests:
              cpu: "100m"
              memory: "64Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
