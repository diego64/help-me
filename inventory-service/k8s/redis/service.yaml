apiVersion: v1
kind: Service
metadata:
  name: inventory-redis
  namespace: inventory
  labels:
    app.kubernetes.io/name: inventory-redis
    app.kubernetes.io/part-of: helpme
spec:
  type: ClusterIP
  selector:
    app: inventory-redis
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
