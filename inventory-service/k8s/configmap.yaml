apiVersion: v1
kind: ConfigMap
metadata:
  name: inventory-config
  namespace: inventory
  labels:
    app.kubernetes.io/part-of: helpme
    app.kubernetes.io/component: inventory-service
data:
  # Server
  NODE_ENV: "production"
  PORT: "3334"
  LOG_LEVEL: "info"
  APP_VERSION: "1.0.0"

  # Database
  DB_USER: "administrator"
  DB_NAME: "inventory-database"
  DB_HOST: "inventory-postgres"
  DB_PORT: "5432"
  DB_MAX_CONNECTIONS: "50"

  # Redis
  REDIS_HOST: "inventory-redis"
  REDIS_PORT: "6379"

  # Kafka — ajuste para o service name do Kafka no seu cluster
  KAFKA_BROKERS: "kafka:9092"
  KAFKA_CLIENT_ID: "inventory-service"
  KAFKA_GROUP_ID: "inventory-service-group"

  # MinIO — ajuste para o service name do MinIO no seu cluster
  MINIO_ENDPOINT: "minio"
  MINIO_PORT: "9000"
  MINIO_USE_SSL: "false"
  MINIO_BUCKET: "inventory-service"
