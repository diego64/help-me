filebeat.inputs:
  - type: log
    enabled: true
    paths:
      - /logs/inventory-service.log
    json.keys_under_root: false
    json.add_error_key: true
    multiline.pattern: '^\{'
    multiline.negate: true
    multiline.match: after
    fields:
      service: inventory-service
      environment: "${NODE_ENV:development}"
    fields_under_root: false
    tags: ["inventory-service", "pino"]

    # Ignora linhas muito curtas ou que não são JSON
    exclude_lines: ["^\\s*$"]

    # Converte cada linha do log como mensagem JSON completa
    parsers:
      - ndjson:
          target: ""
          overwrite_keys: true
          add_error_key: true
          expand_keys: true

# Envia para o Logstash (não direto ao Elasticsearch,
# pois o Logstash faz o enrichment e parsing dos campos pino)
output.logstash:
  hosts: ["elk-inventory-service-logstash:5045"]

# Desabilita Elasticsearch output
output.elasticsearch:
  enabled: false

# Configura índice de estado interno do Filebeat
setup.template.enabled: false
setup.ilm.enabled: false

logging.level: warning
logging.to_files: false
logging.json: true

# Processadores globais
processors:
  - add_host_metadata:
      when.not.contains.tags: forwarded
  - add_docker_metadata: ~
  - drop_fields:
      fields: ["agent.ephemeral_id", "agent.hostname", "agent.id", "agent.version"]
      ignore_missing: true
