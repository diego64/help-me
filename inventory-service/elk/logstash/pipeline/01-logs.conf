# =============================================================
# Pipeline 01 — Logs da aplicação (pino JSON via Filebeat)
# Índice destino: inventory-logs-YYYY.MM.dd
# =============================================================

input {
  beats {
    port => 5045
    host => "0.0.0.0"
  }
}

filter {
  # O campo "message" vem do Filebeat com o JSON do pino
  if [message] {
    json {
      source => "message"
      target => "app"
      skip_on_invalid_json => true
    }
  }

  # Promove campos do pino para o nível raiz
  if [app][time] {
    mutate {
      rename => {
        "[app][time]"        => "@timestamp"
        "[app][level]"       => "level"
        "[app][msg]"         => "msg"
        "[app][pid]"         => "pid"
        "[app][hostname]"    => "hostname"
        "[app][service]"     => "service"
        "[app][environment]" => "environment"
        "[app][err]"         => "error"
        "[app][req]"         => "req"
        "[app][res]"         => "res"
        "[app][responseTime]" => "response_time_ms"
      }
    }

    # Remove o objeto intermediário
    mutate { remove_field => ["app", "log", "input", "ecs", "agent", "tags"] }
  }

  # Converte @timestamp para Date
  date {
    match => ["@timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Mapeia nível numérico do pino para label legível
  if [level] == 10 { mutate { replace => { "level" => "trace" } } }
  if [level] == 20 { mutate { replace => { "level" => "debug" } } }
  if [level] == 30 { mutate { replace => { "level" => "info"  } } }
  if [level] == 40 { mutate { replace => { "level" => "warn"  } } }
  if [level] == 50 { mutate { replace => { "level" => "error" } } }
  if [level] == 60 { mutate { replace => { "level" => "fatal" } } }

  # Extrai campos de req/res para facilitar filtros
  if [req][method]     { mutate { add_field => { "http_method"  => "%{[req][method]}"     } } }
  if [req][url]        { mutate { add_field => { "http_url"     => "%{[req][url]}"         } } }
  if [res][statusCode] { mutate { add_field => { "http_status"  => "%{[res][statusCode]}"  } } }
  if [req][id]         { mutate { add_field => { "request_id"   => "%{[req][id]}"          } } }

  # Converte http_status para inteiro
  if [http_status] {
    mutate { convert => { "http_status" => "integer" } }
  }

  if [response_time_ms] {
    mutate { convert => { "response_time_ms" => "float" } }
  }

  # Tag erros e warnings
  if [level] == "error" or [level] == "fatal" {
    mutate { add_tag => ["error"] }
  }
  if [level] == "warn" {
    mutate { add_tag => ["warning"] }
  }

  # Remove o campo message original (conteúdo duplicado)
  mutate { remove_field => ["message"] }
}

output {
  elasticsearch {
    hosts => ["${ELASTICSEARCH_HOST}"]
    index => "inventory-logs-%{+YYYY.MM.dd}"
    manage_template => true
    template_name => "inventory-logs"
    template => "/usr/share/logstash/pipeline/templates/logs-template.json"
    template_overwrite => true
  }
}
