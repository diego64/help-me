# =============================================================
# Pipeline 03 — Dados de Inventário/Estoque (JDBC → PostgreSQL)
# Poleia: itens_inventario + movimentacoes_estoque + estoque_setor
# Índice destino:
#   - inventory-itens-YYYY.MM.dd
#   - inventory-movimentacoes-YYYY.MM.dd
# Frequência: a cada 30 segundos
# =============================================================

input {

  # ── Itens de Inventário ─────────────────────────────────────
  jdbc {
    jdbc_driver_library => "/usr/share/logstash/logstash-core/lib/jars/postgresql-42.7.3.jar"
    jdbc_driver_class   => "org.postgresql.Driver"
    jdbc_connection_string => "jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}"
    jdbc_user     => "${DB_USER}"
    jdbc_password => "${DB_PASSWORD}"

    schedule => "*/30 * * * * *"

    use_column_value    => true
    tracking_column     => "atualizado_em"
    tracking_column_type => "timestamp"
    last_run_metadata_path => "/usr/share/logstash/data/sincedb/.jdbc_itens"

    clean_run => false
    record_last_run => true

    statement => "
      SELECT
        i.id,
        i.numero,
        i.nome,
        i.sku,
        i.descricao,
        i.unidade,
        i.estoque_atual,
        i.estoque_minimo,
        i.oc_numero,
        i.criado_por,
        i.criado_em,
        i.atualizado_em,
        c.id   AS categoria_id,
        c.nome AS categoria_nome,
        CASE
          WHEN i.estoque_atual = 0             THEN 'zerado'
          WHEN i.estoque_atual < i.estoque_minimo THEN 'critico'
          WHEN i.estoque_atual < i.estoque_minimo * 1.5 THEN 'baixo'
          ELSE 'normal'
        END AS status_estoque,
        CASE WHEN i.estoque_atual < i.estoque_minimo THEN true ELSE false END AS abaixo_minimo,
        COALESCE(
          (SELECT SUM(es.quantidade) FROM estoque_setor es WHERE es.item_inventario_id = i.id),
          0
        ) AS total_estoque_setores,
        'item' AS tipo_registro
      FROM itens_inventario i
      JOIN categorias c ON i.categoria_id = c.id
      WHERE i.atualizado_em > :sql_last_value
      ORDER BY i.atualizado_em ASC
    "

    add_field => { "[@metadata][index_prefix]" => "inventory-itens" }
  }

  # ── Movimentações de Estoque ────────────────────────────────
  jdbc {
    jdbc_driver_library => "/usr/share/logstash/logstash-core/lib/jars/postgresql-42.7.3.jar"
    jdbc_driver_class   => "org.postgresql.Driver"
    jdbc_connection_string => "jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}"
    jdbc_user     => "${DB_USER}"
    jdbc_password => "${DB_PASSWORD}"

    schedule => "*/30 * * * * *"

    use_column_value    => true
    tracking_column     => "criado_em"
    tracking_column_type => "timestamp"
    last_run_metadata_path => "/usr/share/logstash/data/sincedb/.jdbc_movimentacoes"

    clean_run => false
    record_last_run => true

    statement => "
      SELECT
        m.id,
        m.tipo,
        m.motivo,
        m.quantidade,
        m.estoque_before,
        m.estoque_after,
        m.referencia_id,
        m.realizado_por,
        m.observacoes,
        m.setor_destino_id,
        m.setor_destino_nome,
        m.criado_em,
        i.id   AS item_id,
        i.nome AS item_nome,
        i.sku  AS item_sku,
        i.numero AS item_numero,
        c.nome AS categoria_nome,
        CASE
          WHEN m.tipo = 'ENTRADA' THEN  m.quantidade
          WHEN m.tipo = 'SAIDA'   THEN -m.quantidade
          ELSE 0
        END AS variacao_quantidade,
        'movimentacao' AS tipo_registro
      FROM movimentacoes_estoque m
      JOIN itens_inventario i ON m.item_id = i.id
      JOIN categorias c ON i.categoria_id = c.id
      WHERE m.criado_em > :sql_last_value
      ORDER BY m.criado_em ASC
    "

    add_field => { "[@metadata][index_prefix]" => "inventory-movimentacoes" }
  }
}

filter {
  # Define @timestamp como criado_em do registro
  if [criado_em] {
    date {
      match => ["criado_em", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSSSSSX", "yyyy-MM-dd HH:mm:ss.SSSX"]
      target => "@timestamp"
    }
  } else if [atualizado_em] {
    date {
      match => ["atualizado_em", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSSSSSX", "yyyy-MM-dd HH:mm:ss.SSSX"]
      target => "@timestamp"
    }
  }

  mutate {
    remove_field => ["@version", "atualizado_em"]
    convert => {
      "estoque_atual"          => "integer"
      "estoque_minimo"         => "integer"
      "quantidade"             => "integer"
      "estoque_before"         => "integer"
      "estoque_after"          => "integer"
      "variacao_quantidade"    => "integer"
      "total_estoque_setores"  => "integer"
      "abaixo_minimo"          => "boolean"
    }
  }
}

output {
  if [tipo_registro] == "item" {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST}"]
      index => "inventory-itens-%{+YYYY.MM.dd}"
      document_id => "%{id}"
      action => "index"
    }
  } else if [tipo_registro] == "movimentacao" {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST}"]
      index => "inventory-movimentacoes-%{+YYYY.MM.dd}"
      document_id => "%{id}"
      action => "index"
    }
  }
}
