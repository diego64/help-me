# =============================================================
# Pipeline 02 — Dados financeiros (JDBC → PostgreSQL)
# Poleia: solicitacoes_compra + reembolsos
# Índice destino:
#   - inventory-compras-YYYY.MM.dd
#   - inventory-reembolsos-YYYY.MM.dd
# Frequência: a cada 30 segundos
# =============================================================

input {

  # ── Solicitações de Compra ──────────────────────────────────
  jdbc {
    jdbc_driver_library => "/usr/share/logstash/logstash-core/lib/jars/postgresql-42.7.3.jar"
    jdbc_driver_class   => "org.postgresql.Driver"
    jdbc_connection_string => "jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}"
    jdbc_user     => "${DB_USER}"
    jdbc_password => "${DB_PASSWORD}"

    # Polling a cada 30 segundos
    schedule => "*/30 * * * * *"

    # Persiste o último valor lido para não reprocessar registros antigos
    use_column_value    => true
    tracking_column     => "atualizado_em"
    tracking_column_type => "timestamp"
    last_run_metadata_path => "/usr/share/logstash/data/sincedb/.jdbc_compras"

    clean_run => false
    record_last_run => true

    statement => "
      SELECT
        sc.id,
        sc.oc_numero,
        sc.ac_numero,
        sc.status,
        CAST(sc.valor_total AS FLOAT)   AS valor_total,
        sc.forma_pagamento,
        sc.parcelas,
        sc.nfe,
        sc.data_emissao,
        sc.solicitado_por,
        sc.setor_solicitante,
        sc.aprovado_por,
        sc.aprovado_em,
        sc.rejeitado_por,
        sc.rejeitado_em,
        sc.motivo_rejeicao,
        sc.executado_por,
        sc.executado_em,
        sc.observacoes,
        sc.criado_em,
        sc.atualizado_em,
        f.nome    AS fornecedor_nome,
        f.cnpj    AS fornecedor_cnpj,
        COUNT(isc.id)                            AS total_itens,
        COALESCE(SUM(CAST(isc.preco_real AS FLOAT)), 0) AS soma_preco_real,
        'compra' AS tipo_registro
      FROM solicitacoes_compra sc
      LEFT JOIN fornecedores f        ON sc.fornecedor_id = f.id
      LEFT JOIN itens_solicitacao_compra isc ON isc.solicitacao_compra_id = sc.id
      WHERE sc.atualizado_em > :sql_last_value
      GROUP BY sc.id, f.nome, f.cnpj
      ORDER BY sc.atualizado_em ASC
    "

    add_field => { "[@metadata][index_prefix]" => "inventory-compras" }
  }

  # ── Reembolsos ──────────────────────────────────────────────
  jdbc {
    jdbc_driver_library => "/usr/share/logstash/logstash-core/lib/jars/postgresql-42.7.3.jar"
    jdbc_driver_class   => "org.postgresql.Driver"
    jdbc_connection_string => "jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}"
    jdbc_user     => "${DB_USER}"
    jdbc_password => "${DB_PASSWORD}"

    schedule => "*/30 * * * * *"

    use_column_value    => true
    tracking_column     => "atualizado_em"
    tracking_column_type => "timestamp"
    last_run_metadata_path => "/usr/share/logstash/data/sincedb/.jdbc_reembolsos"

    clean_run => false
    record_last_run => true

    statement => "
      SELECT
        r.id,
        CAST(r.valor AS FLOAT) AS valor,
        r.descricao,
        r.status,
        r.url_comprovante,
        r.nfe,
        r.data_emissao,
        r.cnpj_fornecedor,
        r.solicitado_por,
        r.aprovado_por,
        r.aprovado_em,
        r.rejeitado_por,
        r.rejeitado_em,
        r.motivo_rejeicao,
        r.processado_por,
        r.processado_em,
        r.observacoes,
        r.criado_em,
        r.atualizado_em,
        sc.oc_numero AS compra_oc_numero,
        'reembolso' AS tipo_registro
      FROM reembolsos r
      LEFT JOIN solicitacoes_compra sc ON r.solicitacao_compra_id = sc.id
      WHERE r.atualizado_em > :sql_last_value
      ORDER BY r.atualizado_em ASC
    "

    add_field => { "[@metadata][index_prefix]" => "inventory-reembolsos" }
  }
}

filter {
  # @timestamp é o momento do registro no banco
  if [criado_em] {
    date {
      match => ["criado_em", "ISO8601", "yyyy-MM-dd HH:mm:ss.SSSSSSX", "yyyy-MM-dd HH:mm:ss.SSSX"]
      target => "@timestamp"
    }
  }

  # Remove colunas de tracking que não precisam ir para o índice
  mutate {
    remove_field => ["@version", "atualizado_em"]
  }

  # Enriquece compras com flag de aprovado
  if [tipo_registro] == "compra" {
    if [aprovado_em] {
      mutate { add_field => { "foi_aprovada" => true } }
    } else {
      mutate { add_field => { "foi_aprovada" => false } }
    }

    if [executado_em] {
      mutate { add_field => { "foi_executada" => true } }
    } else {
      mutate { add_field => { "foi_executada" => false } }
    }
  }

  # Enriquece reembolsos
  if [tipo_registro] == "reembolso" {
    if [processado_em] {
      mutate { add_field => { "foi_processado" => true } }
    } else {
      mutate { add_field => { "foi_processado" => false } }
    }
  }

  mutate {
    convert => {
      "valor_total"     => "float"
      "valor"           => "float"
      "soma_preco_real" => "float"
      "total_itens"     => "integer"
      "parcelas"        => "integer"
    }
  }
}

output {
  if [tipo_registro] == "compra" {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST}"]
      index => "inventory-compras-%{+YYYY.MM.dd}"
      document_id => "%{id}"
      action => "index"
    }
  } else if [tipo_registro] == "reembolso" {
    elasticsearch {
      hosts => ["${ELASTICSEARCH_HOST}"]
      index => "inventory-reembolsos-%{+YYYY.MM.dd}"
      document_id => "%{id}"
      action => "index"
    }
  }
}
