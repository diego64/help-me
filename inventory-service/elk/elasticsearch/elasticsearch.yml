cluster.name: "elk-inventory-cluster"
node.name: "elk-inventory-service-es"

# ---- Rede ----
network.host: 0.0.0.0
http.port: 9200

# ---- Discovery ----
discovery.type: single-node

# ---- Segurança (desabilitada para ambiente de desenvolvimento) ----
xpack.security.enabled: false
xpack.security.http.ssl.enabled: false
xpack.security.transport.ssl.enabled: false

# ---- Licença ----
xpack.license.self_generated.type: basic

# ---- Memória ----
bootstrap.memory_lock: true

# ---- Índices ----
action.auto_create_index: true

# ---- Retenção de logs (ILM simplificado via templates) ----
# Índices de logs: retidos por 30 dias
# Índices financeiros: retidos por 365 dias
# Índices de estoque: retidos por 180 dias
