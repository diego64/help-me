server.name: "elk-inventory-service"
server.host: "0.0.0.0"
server.port: 5601

elasticsearch.hosts: ["http://elk-inventory-service-es:9200"]

# Desabilita segurança (ambiente de desenvolvimento)
xpack.security.enabled: false
xpack.encryptedSavedObjects.encryptionKey: "inventory-service-elk-key-32chars!!"

# Internacionalização — português BR
i18n.locale: "en"

# Performance
elasticsearch.requestTimeout: 30000
elasticsearch.shardTimeout: 30000

# Logging do Kibana
logging.appenders.default:
  type: console
  layout:
    type: json
logging.root.level: warn

# Telemetry desabilitado
telemetry.enabled: false
telemetry.optIn: false

# Permite importação automática de dashboards
xpack.fleet.enabled: false
