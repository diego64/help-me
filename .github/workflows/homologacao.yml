name: Pipeline CI/CD - Homologação
run-name: Pipeline CI executado por ${{ github.actor }}

on:
  workflow_dispatch:
    inputs:
      version-override:
        description: 'Sobrescrever versão do package.json (opcional, ex: 1.0.0)'
        required: false
        type: string
      create-tag:
        description: 'Criar tag Git com a versão?'
        required: false
        type: boolean
        default: false
      bump-type:
        description: 'Tipo de incremento de versão (se não informar version-override)'
        required: false
        type: choice
        options:
          - none
          - patch
          - minor
          - major
        default: none

permissions:
  contents: write
  security-events: write

jobs:
  ambiente-para-homologacao:
    name: Verificação dos Ambientes
    strategy:
      matrix:
        versao: [20, 22]
        plataforma: ["ubuntu"]
    runs-on: ${{ matrix.plataforma }}-latest
    
    steps:
      - name: Instalação do Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.versao }}
      
      - name: Exibição da versão e da plataforma
        run: |
          node --version
          echo ${{ runner.os }}

  build:
    name: Build
    needs: [ambiente-para-homologacao]
    runs-on: ubuntu-latest
    environment: homologacao
    outputs:
      version: ${{ steps.version.outputs.version }}
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Ativar pnpm
        run: corepack enable
      
      - name: Cache de dependências
        uses: actions/cache@v4
        with:
          path: |
            ./api/node_modules
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      
      - name: Limpar instalação anterior
        working-directory: ./api
        run: |
          rm -rf node_modules .turbo dist
      
      - name: Instalar dependências
        working-directory: ./api
        run: pnpm install --frozen-lockfile
      
      - name: Determinar versão
        id: version
        working-directory: ./api
        run: |
          bump_version() {
            local version=$1
            local bump_type=$2
            
            IFS='.' read -ra VERSION_PARTS <<< "$version"
            MAJOR="${VERSION_PARTS[0]}"
            MINOR="${VERSION_PARTS[1]}"
            PATCH="${VERSION_PARTS[2]}"
            
            case $bump_type in
              major)
                MAJOR=$((MAJOR + 1))
                MINOR=0
                PATCH=0
                ;;
              minor)
                MINOR=$((MINOR + 1))
                PATCH=0
                ;;
              patch)
                PATCH=$((PATCH + 1))
                ;;
            esac
            
            echo "$MAJOR.$MINOR.$PATCH"
          }
          
          PACKAGE_VERSION=$(node -p "require('./package.json').version")
          echo "Versão do package.json: $PACKAGE_VERSION"
          
          if [ -n "${{ inputs.version-override }}" ]; then
            VERSION="${{ inputs.version-override }}"
            echo "Usando versão manual: $VERSION"
          elif [ "${{ inputs.bump-type }}" != "none" ]; then
            VERSION=$(bump_version "$PACKAGE_VERSION" "${{ inputs.bump-type }}")
            echo "Versão incrementada (${{ inputs.bump-type }}): $VERSION"
          else
            VERSION="$PACKAGE_VERSION"
            echo "Usando versão do package.json: $VERSION"
          fi
          
          if ! [[ "$VERSION" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "Versão inválida: $VERSION"
            echo "Formato esperado: X.Y.Z (ex: 1.0.0, 2.3.4)"
            exit 1
          fi
          
          echo "Versão final: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "VERSION=$VERSION" >> $GITHUB_ENV
      
      - name: Atualizar package.json
        if: ${{ inputs.version-override != '' || inputs.bump-type != 'none' }}
        working-directory: ./api
        run: |
          echo "Atualizando package.json para versão ${{ steps.version.outputs.version }}"
          npm version ${{ steps.version.outputs.version }} --no-git-tag-version --allow-same-version
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add package.json
          git commit -m "chore: bump version to ${{ steps.version.outputs.version }} [skip ci]" || echo "Nenhuma alteração"
      
      - name: Gerar Prisma Client (sem banco)
        working-directory: ./api
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
        run: pnpm run generate
      
      - name: Verificar TypeScript
        continue-on-error: true
        working-directory: ./api
        run: |
          echo "Verificando versão do TypeScript:"
          pnpm tsc --version
          echo "Executando type check:"
          pnpm tsc --noEmit --pretty
      
      - name: Build do projeto
        working-directory: ./api
        run: pnpm build
      
      - name: Verificar build gerado
        working-directory: ./api
        run: |
          echo "Conteúdo do diretório dist:"
          ls -lah dist/
          test -f dist/server.js && echo "[SUCESSO] server.js encontrado" || (echo "[ERROR] server.js NÃO encontrado" && exit 1)
      
      - name: Upload do build
        uses: actions/upload-artifact@v4
        with:
          name: build-artifacts
          path: |
            ./api/dist
            ./api/node_modules
          retention-days: 1

  testes-unitarios:
    name: Testes Unitários
    needs: [build]
    runs-on: ubuntu-latest
    environment: homologacao
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Ativar pnpm
        run: corepack enable
      
      - name: Cache de dependências
        uses: actions/cache@v4
        with:
          path: |
            ./api/node_modules
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      
      - name: Instalar dependências
        working-directory: ./api
        run: pnpm install --frozen-lockfile
      
      - name: Gerar Prisma Client (sem banco)
        working-directory: ./api
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/db?schema=public
        run: pnpm run generate
      
      - name: Executar testes unitários
        working-directory: ./api
        run: pnpm run test:unit
      
      - name: Upload de coverage
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-unit
          path: ./api/coverage/
          retention-days: 7
        continue-on-error: true

  testes-e2e:
    name: Testes E2E
    needs: [testes-unitarios]
    runs-on: ubuntu-latest
    environment: homologacao
    timeout-minutes: 30
    
    steps:
      - name: Checkout do código
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
      
      - name: Ativar pnpm
        run: corepack enable
      
      - name: Cache de dependências
        uses: actions/cache@v4
        with:
          path: |
            ./api/node_modules
            ~/.pnpm-store
          key: ${{ runner.os }}-pnpm-${{ hashFiles('**/pnpm-lock.yaml') }}
          restore-keys: |
            ${{ runner.os }}-pnpm-
      
      - name: Instalar dependências
        working-directory: ./api
        run: pnpm install --frozen-lockfile

      - name: Criar .env para docker-compose
        working-directory: ./api
        run: |
          cat > .env << 'EOF'
          DB_USER_TESTE=teste
          DB_PASSWORD_TESTE=senha_teste
          DB_NAME_TESTE=helpme_database_teste
          DB_PORT_TESTE=5433
          MONGO_INITDB_ROOT_USERNAME_TESTE=teste
          MONGO_INITDB_ROOT_PASSWORD_TESTE=senha
          MONGO_INITDB_DATABASE_TESTE=helpme_mongo_teste
          MONGO_PORT_TESTE=27018
          REDIS_PASSWORD_TESTE=
          REDIS_PORT_TESTE=6380
          ZOOKEEPER_CLIENT_PORT_TESTE=2181
          ZOOKEEPER_PORT_TESTE=2182
          INFLUX_USERNAME_TESTE=teste
          INFLUX_PASSWORD_TESTE=senha_teste123
          INFLUX_BUCKET_TESTE=helpme_bucket_teste
          INFLUX_RETENTION_TESTE=1d
          INFLUX_ADMIN_TOKEN_TESTE=TestToken123456
          INFLUX_PORT_TESTE=8087
          EOF

      - name: Subir infraestrutura de testes
        working-directory: ./api
        timeout-minutes: 8
        run: |
          set -e
          echo "=== SUBINDO SERVIÇOS DE TESTE ==="

          docker compose -f docker-compose.yaml up -d \
            postgresql_helpme_teste \
            mongodb_helpme_teste \
            redis_helpme_teste \
            zookeeper_helpme_teste \
            kafka_helpme_teste \
            influxdb_helpme_teste

          echo "Aguardando inicialização dos serviços (90s)..."
          sleep 90

          docker compose -f docker-compose.yaml ps \
            postgresql_helpme_teste \
            mongodb_helpme_teste \
            redis_helpme_teste \
            kafka_helpme_teste

      - name: Criar .env.test
        working-directory: ./api
        run: |
          cat > .env.test << 'EOF'
          # ==================== AMBIENTE DE TESTE ====================
          NODE_ENV=test

          # ==================== BANCO DE DADOS (PRINCIPAL) ====================
          DB_USER=teste
