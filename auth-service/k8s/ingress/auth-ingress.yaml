apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: helpme-auth-service-ingress
  namespace: helpme
  labels:
    app: helpme-auth-service
    tier: application
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"

    # CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "*"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, PATCH, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "Content-Type, Authorization, X-Correlation-ID, X-Request-ID"
    nginx.ingress.kubernetes.io/cors-allow-credentials: "true"

    # Rate limiting restritivo (rotas de autenticação são alvo de brute force)
    nginx.ingress.kubernetes.io/limit-rps: "20"
    nginx.ingress.kubernetes.io/limit-rpm: "100"
    nginx.ingress.kubernetes.io/limit-connections: "5"

    # Timeouts
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "30"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "30"

    # Body size (tokens e credentials são pequenos)
    nginx.ingress.kubernetes.io/proxy-body-size: "1m"

spec:
  tls:
  - hosts:
    - auth.helpme.com
    secretName: helpme-auth-tls-secret
  rules:
  - host: auth.helpme.com
    http:
      paths:
      - path: /health
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 3333
      - path: /auth
        pathType: Prefix
        backend:
          service:
            name: auth-service
            port:
              number: 3333
