apiVersion: v1
kind: ServiceAccount
metadata:
  name: helpme-auth-service
  namespace: helpme
  labels:
    app: helpme-auth-service
    managed-by: kubectl

---
# ResourceQuota escopada à PriorityClass do auth-service
apiVersion: v1
kind: ResourceQuota
metadata:
  name: helpme-auth-quota
  namespace: helpme
  labels:
    app: helpme-auth-service
spec:
  hard:
    requests.cpu: "2"
    requests.memory: 2Gi
    limits.cpu: "4"
    limits.memory: 4Gi
    persistentvolumeclaims: "3"
  scopeSelector:
    matchExpressions:
    - operator: In
      scopeName: PriorityClass
      values: ["helpme-auth-priority"]
