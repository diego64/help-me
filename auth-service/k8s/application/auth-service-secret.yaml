apiVersion: v1
kind: Secret
metadata:
  name: auth-service-secret
  namespace: helpme
  labels:
    app: helpme-auth-service
    tier: application
type: Opaque
stringData:
  # Database
  DB_USER: auth_user
  DB_PASSWORD: auth_secure_password_local
  DATABASE_URL: postgresql://auth_user:auth_secure_password_local@auth-postgres-service:5432/auth-database?connection_limit=10&pool_timeout=60&connect_timeout=30&statement_timeout=60000

  # Redis
  REDIS_PASSWORD: auth_redis_secure_password_local

  # Kafka
  KAFKA_BROKERS: kafka-service:9092

  # JWT — TROQUE em produção por valores fortes e únicos
  JWT_SECRET: auth_jwt_secret_troque_em_producao_min32chars
  JWT_REFRESH_SECRET: auth_jwt_refresh_secret_troque_em_producao_min32chars
